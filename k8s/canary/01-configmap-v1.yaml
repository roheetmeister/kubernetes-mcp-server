apiVersion: v1
kind: ConfigMap
metadata:
  name: webapp-v1-page
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8"/>
      <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
      <title>v1 · Stable</title>
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
          min-height: 100vh;
          background: #0a0a0f;
          font-family: 'Inter', system-ui, sans-serif;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          overflow: hidden;
          position: relative;
          color: #fff;
        }

        /* Animated background blobs */
        body::before {
          content: '';
          position: fixed;
          width: 600px; height: 600px;
          background: radial-gradient(circle, rgba(34,197,94,0.18) 0%, transparent 70%);
          top: -150px; left: -150px;
          border-radius: 50%;
          animation: float 8s ease-in-out infinite;
          pointer-events: none;
        }
        body::after {
          content: '';
          position: fixed;
          width: 500px; height: 500px;
          background: radial-gradient(circle, rgba(16,185,129,0.12) 0%, transparent 70%);
          bottom: -100px; right: -100px;
          border-radius: 50%;
          animation: float 10s ease-in-out infinite reverse;
          pointer-events: none;
        }
        @keyframes float {
          0%, 100% { transform: translate(0,0) scale(1); }
          50%       { transform: translate(40px, 30px) scale(1.08); }
        }

        .grid-bg {
          position: fixed; inset: 0;
          background-image:
            linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
          background-size: 48px 48px;
          pointer-events: none;
        }

        /* Main card */
        .card {
          position: relative;
          background: rgba(255,255,255,0.04);
          border: 1px solid rgba(255,255,255,0.09);
          border-radius: 28px;
          padding: 56px 64px 48px;
          width: min(680px, 92vw);
          backdrop-filter: blur(24px);
          box-shadow: 0 0 0 1px rgba(34,197,94,0.08), 0 32px 80px rgba(0,0,0,0.5);
          animation: cardIn 0.7s cubic-bezier(.16,1,.3,1) both;
        }
        @keyframes cardIn {
          from { opacity: 0; transform: translateY(32px) scale(0.97); }
          to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Top row */
        .top-row {
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-bottom: 40px;
        }
        .pill {
          display: flex; align-items: center; gap: 8px;
          background: rgba(34,197,94,0.12);
          border: 1px solid rgba(34,197,94,0.35);
          border-radius: 999px;
          padding: 7px 18px;
          font-size: 12px; font-weight: 700;
          letter-spacing: 1.5px;
          text-transform: uppercase;
          color: #4ade80;
        }
        .dot {
          width: 8px; height: 8px;
          background: #22c55e;
          border-radius: 50%;
          animation: pulse 2s ease-in-out infinite;
          box-shadow: 0 0 0 0 rgba(34,197,94,0.6);
        }
        @keyframes pulse {
          0%   { box-shadow: 0 0 0 0 rgba(34,197,94,0.6); }
          70%  { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
          100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
        }
        .env-tag {
          font-size: 11px; font-weight: 600;
          color: rgba(255,255,255,0.3);
          letter-spacing: 1px;
          text-transform: uppercase;
        }

        /* Version hero */
        .version-hero {
          display: flex; align-items: baseline; gap: 16px;
          margin-bottom: 8px;
        }
        .version-label {
          font-size: 88px; font-weight: 900;
          line-height: 1;
          background: linear-gradient(135deg, #22c55e 0%, #4ade80 50%, #86efac 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
          letter-spacing: -4px;
        }
        .version-name {
          font-size: 22px; font-weight: 300;
          color: rgba(255,255,255,0.5);
          letter-spacing: -0.5px;
        }

        .tagline {
          font-size: 15px;
          color: rgba(255,255,255,0.4);
          font-weight: 400;
          margin-bottom: 44px;
          letter-spacing: 0.2px;
        }

        /* Traffic section */
        .traffic-section {
          background: rgba(0,0,0,0.25);
          border: 1px solid rgba(255,255,255,0.07);
          border-radius: 18px;
          padding: 28px 32px;
        }
        .traffic-header {
          display: flex; align-items: center; justify-content: space-between;
          margin-bottom: 20px;
        }
        .traffic-title {
          font-size: 11px; font-weight: 700;
          letter-spacing: 2px; text-transform: uppercase;
          color: rgba(255,255,255,0.35);
        }
        .traffic-live {
          font-size: 11px; font-weight: 600;
          color: #22c55e; letter-spacing: 1px;
          text-transform: uppercase;
        }

        /* Bar */
        .bar-wrap {
          position: relative;
          height: 10px;
          background: rgba(255,255,255,0.07);
          border-radius: 999px;
          overflow: hidden;
          margin-bottom: 20px;
        }
        .bar-stable {
          position: absolute; left: 0; top: 0; bottom: 0;
          width: ${STABLE_PCT}%;
          background: linear-gradient(90deg, #16a34a, #22c55e);
          border-radius: 999px;
          animation: barGrow 1.4s cubic-bezier(.16,1,.3,1) both;
          animation-delay: 0.4s;
        }
        .bar-canary {
          position: absolute; right: 0; top: 0; bottom: 0;
          width: ${CANARY_PCT}%;
          background: linear-gradient(90deg, #d97706, #f59e0b);
          border-radius: 999px;
        }
        @keyframes barGrow {
          from { width: 0; }
          to   { width: ${STABLE_PCT}%; }
        }

        .traffic-legend {
          display: flex; gap: 0;
        }
        .legend-item {
          flex: 1;
          display: flex; align-items: center; gap: 10px;
        }
        .legend-item + .legend-item { border-left: 1px solid rgba(255,255,255,0.07); padding-left: 24px; }
        .legend-swatch {
          width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0;
        }
        .swatch-stable { background: #22c55e; }
        .swatch-canary { background: #f59e0b; }
        .legend-info {}
        .legend-pct {
          font-size: 26px; font-weight: 800;
          line-height: 1;
          letter-spacing: -1px;
        }
        .pct-stable { color: #4ade80; }
        .pct-canary { color: #fbbf24; }
        .legend-desc {
          font-size: 11px; font-weight: 500;
          color: rgba(255,255,255,0.35);
          text-transform: uppercase; letter-spacing: 1px;
          margin-top: 2px;
        }

        /* Footer */
        .footer {
          margin-top: 36px;
          display: flex; align-items: center; justify-content: center; gap: 20px;
          font-size: 11px; color: rgba(255,255,255,0.2);
          letter-spacing: 0.5px;
        }
        .footer-dot { width: 3px; height: 3px; background: rgba(255,255,255,0.15); border-radius: 50%; }
      </style>
    </head>
    <body>
      <div class="grid-bg"></div>
      <div class="card">
        <div class="top-row">
          <div class="pill"><div class="dot"></div> Stable</div>
          <div class="env-tag">Canary Deployment</div>
        </div>

        <div class="version-hero">
          <div class="version-label">v1</div>
          <div class="version-name">Production</div>
        </div>
        <div class="tagline">Battle-tested release — serving the majority of traffic</div>

        <div class="traffic-section">
          <div class="traffic-header">
            <div class="traffic-title">Traffic Distribution</div>
            <div class="traffic-live">&#9679; Live</div>
          </div>
          <div class="bar-wrap">
            <div class="bar-stable"></div>
            <div class="bar-canary" style="left:${STABLE_PCT}%;right:0;width:${CANARY_PCT}%"></div>
          </div>
          <div class="traffic-legend">
            <div class="legend-item">
              <div class="legend-swatch swatch-stable"></div>
              <div class="legend-info">
                <div class="legend-pct pct-stable">${STABLE_PCT}%</div>
                <div class="legend-desc">v1 · Stable</div>
              </div>
            </div>
            <div class="legend-item">
              <div class="legend-swatch swatch-canary"></div>
              <div class="legend-info">
                <div class="legend-pct pct-canary">${CANARY_PCT}%</div>
                <div class="legend-desc">v2 · Canary</div>
              </div>
            </div>
          </div>
        </div>

        <div class="footer">
          <span>nginx:1.24</span>
          <div class="footer-dot"></div>
          <span>3 replicas</span>
          <div class="footer-dot"></div>
          <span>NGINX Ingress · canary-weight: ${WEIGHT}</span>
        </div>
      </div>
    </body>
    </html>
